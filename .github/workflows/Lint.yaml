# goal is to check code synatx, indentaion whenever someone pushes the code
name: Lint

on:
  push:
    paths: "*.py"
  workflow_dispatch:

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout/clone
        uses: actions/checkout@v7
      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x' 
      - name: Install lint Ruff
        run: pip install ruff
      - name: Check Ruff
        run: ruff check .
      
